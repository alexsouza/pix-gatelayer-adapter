spring:
  application:
    name: pix-gatelayer-adapter

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: pix-gatelayer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "br.com.basa.pix.*"

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

pix:
  soap:
    url: http://localhost:8080/ws/pix
  kafka:
    topic: pix-transfer-events

resilience4j:
  circuitbreaker:
    instances:
      legacySoap:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      legacySoap:
        max-attempts: 3
        wait-duration: 500ms

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [correlationId=%X{correlationId}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: pix-gatelayer-adapter
    version: 1.0.0-SNAPSHOT
    description: Anti-Corruption Layer para operações Pix via SOAP/Kafka
